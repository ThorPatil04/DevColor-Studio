# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/devcolor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# 256-bit base64 secret key for HS256: "dGhpc2lzYWJlYXV0aWZ1bHNlY3JldGtleWZvcmRldmNvbG9yc3R1ZGlvYXBwbGljYXRpb25zZWN1cml0eQ=="
# (this encodes to "thisisabeautifulsecretkeyfordevcolorstudioapplicationsecurity" which is >256 bits)
jwt.secret=dGhpc2lzYWJlYXV0aWZ1bHNlY3JldGtleWZvcmRldmNvbG9yc3R1ZGlvYXBwbGljYXRpb25zZWN1cml0eQ==
# 24 hours in milliseconds
jwt.expiration=86400000

# File Upload / Resource Settings (if needed)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
